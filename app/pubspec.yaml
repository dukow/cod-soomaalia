name: cod_soomaali
description: "Cod Soomaali - Offline Somali Text-to-Speech (Meta MMS + sherpa-onnx)"
publish_to: 'none'
version: 1.1.0+3

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sherpa_onnx: ^1.12.14
  path_provider: ^2.1.4
  audioplayers: ^6.1.0
  share_plus: ^10.1.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/model/model.onnx
    - assets/model/tokens.txt

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon_1024.png"
  adaptive_icon_background: "#184482"
  adaptive_icon_foreground: "assets/icon/icon_1024.png"
